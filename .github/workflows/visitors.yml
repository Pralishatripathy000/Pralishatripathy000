name: Visitors Count
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-visitors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update visitor count
        uses: guided-hacking/github-profile-views-counter@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
